services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sijaga-frankenphp
    ports:
      - "8000:8000"
      - "5173:5173" # Port Vite untuk HMR
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sijaga
      - DB_USERNAME=sijaga
      - DB_PASSWORD=sijaga2026
      - REDIS_HOST=redis
      - CHOKIDAR_USEPOLLING=true # Penting untuk Vite HMR di Docker
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    networks:
      - sijaga-network
    # Mode dev: jalankan octane dengan opsi --watch agar me-reload otomatis saat file berubah
    command: ["php", "artisan", "octane:start", "--server=frankenphp", "--host=0.0.0.0", "--port=8000", "--watch"]

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=secret
      - MYSQL_DATABASE=sijaga
      - MYSQL_USER=sijaga
      - MYSQL_PASSWORD=sijaga2026
    volumes:
      - sijaga-mysql-data:/var/lib/mysql
    networks:
      - sijaga-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - sijaga-redis-data:/data
    networks:
      - sijaga-network

networks:
  sijaga-network:
    driver: bridge

volumes:
  sijaga-mysql-data:
  sijaga-redis-data:
